<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Challenge | Milescore</title>
    <style>
        :root { --primary: #0062FF; --accent: #CDFC48; --bg: #0a0a0a; --card-bg: #141414; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { padding: 60px 20px; text-align: center; }
        h1 { font-size: 3rem; margin: 0; letter-spacing: -2px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; width: 100%; max-width: 900px; padding: 20px; box-sizing: border-box; }
        .card { background: var(--card-bg); border: 1px solid #222; padding: 30px; text-decoration: none; color: white; transition: 0.3s; position: relative; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .card.disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }
        .task-num { color: var(--primary); font-size: 0.8rem; font-weight: bold; display: block; margin-bottom: 10px; }
        .card h2 { margin: 0 0 10px 0; }
        .card p { color: #888; font-size: 0.9rem; line-height: 1.4; }
        .github-link { margin-top: auto; padding: 40px; color: var(--accent); text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>AI Challenge</h1>
        <p style="color: #666;">Milescore Portfolio</p>
    </div>

    <div class="grid">
        <!-- Task 1 -->
        <a href="https://milescore.github.io/AI-challenge/task-1/" class="card">
            <span class="task-num">Task 01</span>
            <h2>Infrastructure & Architecture</h2>
            <p>Визуализация систем и базовые принципы AI-архитектуры.</p>
        </a>

        <!-- Task 2 -->
        <!-- https://keyframe-design-hub.lovable.app/ -->
        <a href="https://keyframe-events.lovable.app" class="card">
            <span class="task-num">Task 02</span>
            <h2>KEYFRAME</h2>
            <p>Платформа для дизайн-событий. Система RSVP, чек-ин и генеративные постеры.</p>
        </a>

        <div class="card disabled">
            <span class="task-num">Task 03</span>
            <h2>Coming Soon</h2>
            <p>В разработке...</p>
        </div>
    </div>

    <a href="https://github.com/milescore/AI-challenge" class="github-link">view on github</a>
</body>
</html>
